name: CI (trigger)

# Reusable CI workflow for Swift macOS apps. Apps invoke this with:
#   uses: douglaslassance/trigger/.github/workflows/ci.yml@<tag>

on:
  workflow_call:
    inputs:
      runner:
        required: false
        type: string
        default: "macos-15"
      run-tests:
        required: false
        type: boolean
        default: true
      run-lint:
        required: false
        type: boolean
        default: true

jobs:
  lint-and-test:
    name: Lint and test
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Swift version
        run: swift --version

      - name: Install SwiftLint
        if: inputs.run-lint
        run: brew install swiftlint

      - name: Run SwiftLint
        if: inputs.run-lint
        run: swiftlint lint --strict
        continue-on-error: true

      - name: Build
        run: swift build -v

      - name: Run tests
        if: inputs.run-tests
        run: swift test -v
        continue-on-error: true

      - name: Check formatting
        if: inputs.run-lint
        run: swift-format lint --recursive . || true
        continue-on-error: true
